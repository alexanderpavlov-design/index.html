<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пожелание хорошего дня</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        /* Стили для главной страницы с картинкой */
        .container {
            text-align: center;
        }

        .wish-image {
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .wish-image:hover {
            transform: scale(1.05);
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
        }

        .click-hint {
            margin-top: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Стили для страницы с пожеланием */
        .wish-card {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        .wish-card h1 {
            color: #764ba2;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .wish-text {
            font-size: 1.5rem;
            line-height: 1.4;
            color: #333;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            font-style: italic;
        }

        .emoji {
            font-size: 4rem;
            margin: 20px 0;
        }

        .new-wish-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        .new-wish-btn:hover {
            transform: scale(1.05);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .wish-card {
                padding: 30px 20px;
            }
            .wish-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<script>
    // Пожелания на "ты"
    const wishes = [
        { text: "Пусть этот день подарит тебе море улыбок и радости! ☀️", emoji: "😊" },
        { text: "Желаю тебе чудесного дня, полного приятных сюрпризов! 🎁", emoji: "🎉" },
        { text: "Пусть удача идёт с тобой рука об руку весь день! 🍀", emoji: "✨" },
        { text: "Хорошего настроения и лёгких решений всех задач! 💪", emoji: "🌟" },
        { text: "Пусть этот день будет таким же прекрасным, как ты! 💖", emoji: "🌸" },
        { text: "Желаю тебе новых достижений и приятных впечатлений! 🚀", emoji: "⭐" },
        { text: "Пусть всё задуманное сегодня обязательно сбудется! 🎯", emoji: "🌈" },
        { text: "Отличного дня, вдохновения и душевного тепла! 🔥", emoji: "💫" },
        { text: "Пусть твоя улыбка сегодня осветит весь мир! 😄", emoji: "🌞" },
        { text: "Желаю тебе только хороших новостей и приятных встреч! 🤗", emoji: "💐" }
    ];

    // Функция для получения случайного пожелания
    function getRandomWish() {
        const randomIndex = Math.floor(Math.random() * wishes.length);
        return wishes[randomIndex];
    }

    // Функция для отображения страницы с пожеланием
    function showWishPage() {
        const wish = getRandomWish();
        
        document.body.innerHTML = `
            <div class="container">
                <div class="wish-card">
                    <div class="emoji">${wish.emoji}</div>
                    <h1>✨ Пожелание на сегодня ✨</h1>
                    <div class="wish-text">${wish.text}</div>
                    <button class="new-wish-btn" onclick="location.reload()">🎲 Новое пожелание</button>
                    <br>
                    <a href="#" class="back-link" onclick="goBackToImage(); return false;">← Вернуться к картинке</a>
                </div>
            </div>
        `;
        
        // Сохраняем состояние в истории
        history.pushState({ page: "wish" }, "", "?wish");
    }

    // Функция для возврата к картинке
    function goBackToImage() {
        document.body.innerHTML = `
            <div class="container">
                <img src="https://sun9-70.userapi.com/s/v1/ig2/JEn97pleq53m2X9u-VbCMutLh3fn2dBPM-pb9KD-26UmbdjoLShFHZFeFEdadigoeK4uviN-gLtBaKxYRFGx8SAU.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720&from=bu&u=ZBYgrc4JBDemnLjiyTUWkuJZpz7cW9Eo5txHI-FZo-c&cs=1280x0" 
                     alt="Красивая картинка" 
                     class="wish-image"
                     onclick="showWishPage()">
                <div class="click-hint">
                    ✨ Нажми на картинку, чтобы получить пожелание ✨
                </div>
            </div>
        `;
        history.pushState({ page: "image" }, "", "/");
    }

    // Проверяем, есть ли параметр в URL
    if (window.location.search === "?wish" || window.location.hash === "#wish") {
        showWishPage();
    } else {
        // Инициализация главной страницы с картинкой
        document.body.innerHTML = `
            <div class="container">
                <img src="https://sun9-70.userapi.com/s/v1/ig2/JEn97pleq53m2X9u-VbCMutLh3fn2dBPM-pb9KD-26UmbdjoLShFHZFeFEdadigoeK4uviN-gLtBaKxYRFGx8SAU.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720&from=bu&u=ZBYgrc4JBDemnLjiyTUWkuJZpz7cW9Eo5txHI-FZo-c&cs=1280x0" 
                     alt="Красивая картинка" 
                     class="wish-image"
                     onclick="showWishPage()">
                <div class="click-hint">
                    ✨ Нажми на картинку, чтобы получить пожелание ✨
                </div>
            </div>
        `;
    }

    // Обработка кнопок назад/вперёд в браузере
    window.addEventListener('popstate', function(event) {
        if (event.state && event.state.page === "wish") {
            showWishPage();
        } else {
            goBackToImage();
        }
    });
</script>

</body>
</html>
